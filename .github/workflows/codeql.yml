name: "CodeQL Advanced"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '30 2 * * 0' # Einmal pro Woche in der Nacht

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Zwingend nötig für deine Engine!
    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'temurin'
        cache: maven

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Fokussiert die Analyse auf Sicherheit (lässt unwichtige Style-Warnungen weg)
        queries: security-extended,security-and-quality 

    # Wir zwingen CodeQL, nur den Main-Code zu kompilieren.
    # Benchmarks und Test-Ressourcen (-DskipTests) werden ignoriert!
    - name: Build Main Code
      run: mvn clean compile -B -DskipTests

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
